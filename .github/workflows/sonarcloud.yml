name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f548e57e544e1ff5a4c46bf1e1b8685f8e4a348a # v4
      - uses: actions/setup-node@32f57ac043e003bc1b07edcb2b9102bbbf3e92f1 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: SonarCloud scan
        uses: sonarsource/sonarqube-scan-action@ad8210318ac8bb816e41990d5af2b304f7a6c213 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
